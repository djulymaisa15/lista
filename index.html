<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pet Shop Interativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="pet-card">
        <h1>🐾 Pet Shop</h1>
        <ul id="lista-pets" class="pet-list"></ul>

        <button id="btn-verificar" class="pet-button">
            VERIFICAR LETRA "A" 🐾
        </button>

        <div id="resultado">
            Encontrei <span id="valor">0</span> nomes com "A"!
        </div>
    </div>

    <script>
        const pets = ["Jorge", "Joaquim", "Mikaelly", "Laura", "Nicole", "Thamily"];
        const listaUl = document.getElementById('lista-pets');

        // Criando a lista inicial (apenas > 5 letras)
        for (let i = 0; i < pets.length; i++) {
            if (pets[i].length > 5) {
                let li = document.createElement('li');
                li.className = 'pet-item';
                li.textContent = pets[i];
                listaUl.appendChild(li);
            }
        }

        // Fazendo o botão funcionar
        document.getElementById('btn-verificar').onclick = function() {
            const itens = document.querySelectorAll('.pet-item');
            let contador = 0;

            // Loop para checar cada item na tela
            itens.forEach(item => {
                if (item.textContent.toUpperCase().includes('A')) {
                    item.classList.add('destaque-pet');
                    contador++;
                }
            });

            // Mostra o resultado final
            const resDiv = document.getElementById('resultado');
            document.getElementById('valor').textContent = contador;
            resDiv.style.display = 'block';
        };
    </script>
</body>
</html>
