<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista VIP Neon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>GUEST LIST</h1>
            <div class="glow-line"></div>
        </header>
        
        <ul id="lista-convidados">
            </ul>

        <div class="counter-card">
            <span class="label">NOMES COM "A"</span>
            <span id="total-a" class="number">0</span>
        </div>
    </div>

    <script>
        const nomes = ["Amanda", "Bruno", "Arthur", "Carlos", "Alice", "Daniel", "Augusto"];
        const listaElement = document.getElementById('lista-convidados');
        let contador = 0;

        nomes.forEach(nome => {
            // Criação do item
            const li = document.createElement('li');
            li.textContent = nome;
            listaElement.appendChild(li);

            // Lógica de contagem
            if(nome.toUpperCase().startsWith('A')) {
                contador++;
                li.classList.add('highlight'); // Adiciona brilho especial se começar com A
            }
        });

        document.getElementById('total-a').textContent = contador;
    </script>
</body>
</html>
