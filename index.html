<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pet Shop Interativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="pet-card">
        <h1>🐾 Pet Check-in</h1>
        <p class="subtitle">Nomes com mais de 5 letras:</p>
        
        <ul id="lista-pets" class="pet-list">
            </ul>

        <button id="btn-contar" class="pet-button">
            Contar nomes com "A" 🐾
        </button>

        <div id="resultado-container" class="resultado-hidden">
            Nomes com a letra "A": <span id="count-a">0</span>
        </div>
    </div>

    <script>
        const pets = ["Jorge", "Joaquim", "Mikaelly", "Laura", "Nicole", "Thamily"];
        const listaUl = document.getElementById('lista-pets');
        let contadorA = 0;

        // Simulando o RANGE (de 0 até o tamanho da lista)
        for (let i = 0; i < pets.length; i++) {
            let nome = pets[i];

            if (nome.length > 5) {
                let li = document.createElement('li');
                li.className = 'pet-item';
                li.textContent = nome; // CSS transforma em MAIÚSCULO
                listaUl.appendChild(li);

                if (nome.toUpperCase().startsWith('A')) {
                    contadorA++;
                }
            }
        }

        // Função do Botão
        document.getElementById('btn-contar').addEventListener('click', function() {
            const resDiv = document.getElementById('resultado-container');
            const countSpan = document.getElementById('count-a');
            
            countSpan.textContent = contadorA;
            resDiv.classList.remove('resultado-hidden');
            resDiv.classList.add('resultado-visible');
        });
    </script>
</body>
</html>
