<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pet Shop Check-in</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="pet-card">
        <h1>🐾 Pet Check-in</h1>
        <p>Nomes com mais de 5 letras:</p>
        
        <ul id="lista-pets" class="pet-list">
            </ul>

        <div class="counter-badge">
            Pets com a letra "A": <span id="count-a">0</span>
        </div>
    </div>

    <script>
        const pets = ["Jorge", "Joaquim", "Mikaelly", "Laura", "Nicole", "Thamily"];
        const listaUl = document.getElementById('lista-pets');
        let contadorA = 0;

        // Função que simula o Range (i vai de 0 até o final da lista)
        for (let i = 0; i < pets.length; i++) {
            let nome = pets[i];

            // Filtro de tamanho (mais de 5 letras)
            if (nome.length > 5) {
                let li = document.createElement('li');
                li.className = 'pet-item';
                li.textContent = nome; // O CSS transforma em MAIÚSCULA
                listaUl.appendChild(li);

                // Lógica da letra A
                if (nome.toUpperCase().startsWith('A')) {
                    contadorA++;
                }
            }
        }

        document.getElementById('count-a').textContent = contadorA;
    </script>
</body>
</html>
