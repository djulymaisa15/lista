<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista VIP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>GUEST LIST</h1>
        
        <ul id="lista-convidados">
            </ul>

        <div class="contador-box">
            <span>COMEÇAM COM A LETRA "A"</span>
            <span id="num-a">0</span>
        </div>
    </div>

    <script>
        const nomes = ["Amanda", "Bruno", "Arthur", "Carlos", "Alice", "Daniel", "Augusto"];
        const listaUI = document.getElementById('lista-convidados');
        let totalA = 0;

        // Loop para processar os nomes
        nomes.forEach(nome => {
            // Criar item da lista
            let item = document.createElement('li');
            item.textContent = nome;
            listaUI.appendChild(item);

            // Contagem (Lógica Java-like)
            if (nome.toUpperCase().startsWith('A')) {
                totalA++;
            }
        });

        document.getElementById('num-a').textContent = totalA;
    </script>

</body>
</html>
