<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Guest List Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Lista de Convidados</h1>
        
        <ul id="lista">
            </ul>

        <div class="stats">
            Nomes com a letra "A": <span id="contagem">0</span>
        </div>
    </div>

    <script>
        const convidados = ["Alice", "Bruno", "Amanda", "Carlos", "Arthur", "Beatriz"];
        const listaDoc = document.getElementById('lista');
        let count = 0;

        convidados.forEach(nome => {
            // Criando o elemento visual
            let li = document.createElement('li');
            li.textContent = nome; // O CSS deixará em maiúsculo
            listaDoc.appendChild(li);

            // Lógica de contagem
            if(nome.toUpperCase().startsWith('A')) count++;
        });

        document.getElementById('contagem').textContent = count;
    </script>
</body>
</html>
