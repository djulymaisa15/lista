<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista VIP Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>VIP GUESTS</h1>
        <ul id="lista-nomes">
            </ul>
        <div class="counter">
            Nomes com a letra "A": <b id="total-a">0</b>
        </div>
    </div>

    <script>
        const convidados = ["Jorge", "Joaquim", "Mikaelly", "Laura", "Nicole", "Thamily"];
        const listaUl = document.getElementById('lista-nomes');
        let contadorA = 0;

        convidados.forEach(nome => {
            // Cria o item da lista
            let li = document.createElement('li');
            li.textContent = nome;
            listaUl.appendChild(li);

            // Conta se começa com A
            if (nome.toUpperCase().startsWith('A')) {
                contadorA++;
            }
        });

        // Atualiza o contador na tela
        document.getElementById('total-a').textContent = contadorA;
    </script>

</body>
</html>
