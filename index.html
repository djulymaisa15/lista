<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pet Shop - Busca de Letras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="pet-card">
        <h1>🐾 Pet Check-in</h1>
        <ul id="lista-pets" class="pet-list"></ul>

        <button id="btn-contar" class="pet-button">
            Verificar Letra "A" 🐾
        </button>

        <div id="resultado-container" class="resultado-hidden">
            Nomes com a letra "A": <span id="count-a">0</span>
        </div>
    </div>

    <script>
        const pets = ["Jorge", "Joaquim", "Mikaelly", "Laura", "Nicole", "Thamily"];
        const listaUl = document.getElementById('lista-pets');
        let contadorA = 0;

        // Loop com RANGE para exibir apenas nomes > 5 letras
        for (let i = 0; i < pets.length; i++) {
            let nome = pets[i];
            if (nome.length > 5) {
                let li = document.createElement('li');
                li.className = 'pet-item';
                li.textContent = nome;
                listaUl.appendChild(li);
            }
            
            // Lógica: Se o nome CONTÉM a letra 'A'
            if (nome.toUpperCase().includes('A')) {
                contadorA++;
            }
        }

        document.getElementById('btn-contar').addEventListener('click', function() {
            const resDiv = document.getElementById('resultado-container');
            document.getElementById('count-a').textContent = contadorA;
            resDiv.className = 'resultado-visible';
        });
    </script>
</body>
</html>
